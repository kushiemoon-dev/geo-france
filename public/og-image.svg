<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stylized geological layers -->
  <path d="M0,420 Q200,380 400,400 T800,390 T1200,410 L1200,630 L0,630Z" fill="#d97706" opacity="0.6"/>
  <path d="M0,460 Q300,430 600,450 T1200,440 L1200,630 L0,630Z" fill="#059669" opacity="0.6"/>
  <path d="M0,510 Q250,490 500,505 T1000,495 T1200,510 L1200,630 L0,630Z" fill="#2563eb" opacity="0.6"/>
  <!-- Hexagon icon -->
  <g transform="translate(540,120) scale(2.5)">
    <defs>
      <clipPath id="hex2">
        <polygon points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5"/>
      </clipPath>
    </defs>
    <g clip-path="url(#hex2)">
      <rect y="0" width="32" height="11" fill="#d97706"/>
      <rect y="11" width="32" height="10" fill="#059669"/>
      <rect y="21" width="32" height="11" fill="#2563eb"/>
    </g>
    <polygon points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5" fill="none" stroke="#fff" stroke-width="1.5"/>
  </g>
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Carte Géologique de France</text>
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#94a3b8">Carte interactive des formations géologiques</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">13 régions | Pendages | Notices BRGM</text>
</svg>
