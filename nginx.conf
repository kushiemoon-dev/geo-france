server {
    listen 80;
    server_name geo.local;
    root /srv/http/geo-france/dist;
    index index.html;

    # PMTiles - byte range requests + CORS
    location /data/ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets with cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://upload.wikimedia.org https://*.wikimedia.org; font-src 'self' https://demotiles.maplibre.org; connect-src 'self' https://*.maplibre.org https://geoservices.brgm.fr https://commons.wikimedia.org https://infoterre.brgm.fr; worker-src blob:; child-src blob:" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
